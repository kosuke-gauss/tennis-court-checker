name: Check Tennis Courts

on:
  schedule:
    - cron: '0 21 * * *' # 例: 毎日朝6時(JST)に実行
  workflow_dispatch: # 手動実行用

# 💡 ここに環境変数を追加して、GitHubのアクションをNode 24で強制実行する
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # もし他にシークレット（TOSHIMA_IDなど）をここに書いていればそのまま残す

jobs:
  check-courts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 💡 ここを 20 から 24 に変更

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install chromium

      - name: Run script
        env:
          SPOREC_ID: ${{ secrets.SPOREC_ID }}
          SPOREC_PW: ${{ secrets.SPOREC_PW }}
          TOSHIMA_ID: ${{ secrets.TOSHIMA_ID }}
          TOSHIMA_PW: ${{ secrets.TOSHIMA_PW }}
          SUMIDA_ID: ${{ secrets.SUMIDA_ID }}
          SUMIDA_PW: ${{ secrets.SUMIDA_PW }}
          CHIYODA_ID: ${{ secrets.CHIYODA_ID }}
          CHIYODA_PW: ${{ secrets.CHIYODA_PW }}
        run: node src/checker.js

name: 都営・豊島・墨田・千代田 テニスコート空き確認

on:
  schedule:
    - cron: "0  9 * * 1-5"   # JST 18:00
    - cron: "30  9 * * 1-5"  # JST 18:30
    - cron: "0 10 * * 1-5"   # JST 19:00
    - cron: "30 10 * * 1-5"  # JST 19:30
    - cron: "0 11 * * 1-5"   # JST 20:00
    - cron: "30 11 * * 1-5"  # JST 20:30
    - cron: "0 12 * * 1-5"   # JST 21:00
    - cron: "30 12 * * 1-5"  # JST 21:30
    - cron: "0  0 * * 1-5"   # JST 09:00（朝の先読み）
  workflow_dispatch:

jobs:
  check-courts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: テニスコート空き確認
        env:
          LINE_TOKEN:  ${{ secrets.LINE_TOKEN }}
          SPOREC_ID:   ${{ secrets.SPOREC_ID }}
          SPOREC_PW:   ${{ secrets.SPOREC_PW }}
          TOSHIMA_ID:  ${{ secrets.TOSHIMA_ID }}
          TOSHIMA_PW:  ${{ secrets.TOSHIMA_PW }}
          SUMIDA_ID:   ${{ secrets.SUMIDA_ID }}
          SUMIDA_PW:   ${{ secrets.SUMIDA_PW }}
          CHIYODA_ID:  ${{ secrets.CHIYODA_ID }}
          CHIYODA_PW:  ${{ secrets.CHIYODA_PW }}
        run: node src/checker.js
